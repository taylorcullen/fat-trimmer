services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node_modules/prisma/build/index.js", "db", "push", "--skip-generate"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/weighttracker?schema=public

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/weighttracker?schema=public
      - NEXTAUTH_URL=https://unparadoxical-renaldo-plaguily.ngrok-free.dev
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://192.168.88.25:9000}
      - S3_BUCKET=${S3_BUCKET:-fat-trimmer}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-admin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-Password001!}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
